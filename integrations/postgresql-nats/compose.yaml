services:
  postgres:
    image: postgres:latest
    command: "-c wal_level=logical -c max_wal_senders=5 -c max_replication_slots=5"
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./generator-sql:/docker-entrypoint-initdb.d
  
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command:
      - "--debug"
      - "--http_port=8222"
      - "--js"
  
  source-connector-nats:
    build:
      context: ./nats-jetstream
    environment:
      NATS_JETSREAM_URL: ${NATS_JETSREAM_URL}
      NATS_JETSREAM_SUBJECTS: ${NATS_JETSREAM_SUBJECTS}
      PIPELINE_ACCESS_TOKEN: ${PIPELINE_ACCESS_TOKEN}
      PIPELINE_ID: ${PIPELINE_ID}
      SPACE_ID: ${SPACE_ID}
    depends_on:
      - nats
  
  debezium:
    image: docker.io/debezium/server:latest
    volumes:
      - ./debezium/application.properties:/debezium/conf/application.properties
    depends_on:
      - source-connector-nats
    extra_hosts:
      - "host.docker.internal:host-gateway"

